<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - HMERP</title>
    <link rel="stylesheet" href="login.css">
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-logo">
                <img src="https://hmerp.laravel.cloud/images/logo_brand.png" alt="HMERP">
            </div>
            <h1 class="login-title">Đăng nhập</h1>
            
            <form id="loginForm" class="login-form">
                <div class="form-group">
                    <label class="form-label">Tài khoản</label>
                    <input type="text" id="username" class="form-input" placeholder="Nhập số điện thoại hoặc email" required>
                </div>
                
                <div class="form-group">
                    <label class="form-label">Mật khẩu</label>
                    <div class="password-wrapper">
                        <input type="password" id="password" class="form-input" placeholder="Nhập mật khẩu" required>
                        <button type="button" class="password-toggle" id="togglePassword">👁️</button>
                    </div>
                </div>
                
                <div class="form-group checkbox-group">
                    <label class="checkbox-label">
                        <input type="checkbox" id="remember"> Ghi nhớ đăng nhập
                    </label>
                </div>
                
                <button type="submit" class="btn-login">Đăng nhập</button>
            </form>
            
            <div class="login-note">
                <p>Tài khoản demo: <strong>admin</strong> / <strong>123456</strong></p>
            </div>
        </div>
    </div>
    
    <script src="login.js"></script>
</body>
</html>
